<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Cyna product placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e0b3d"/>
      <stop offset="100%" stop-color="#0d0520"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#7C00FF" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#7C00FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#302082"/>
      <stop offset="100%" stop-color="#7C00FF"/>
